<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744"/>
      <stop offset="20%" stop-color="#ffea00"/>
      <stop offset="40%" stop-color="#00e676"/>
      <stop offset="60%" stop-color="#2979ff"/>
      <stop offset="80%" stop-color="#d500f9"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,23,68,0.4)"/>
      <stop offset="20%" stop-color="rgba(255,234,0,0.4)"/>
      <stop offset="40%" stop-color="rgba(0,230,118,0.4)"/>
      <stop offset="60%" stop-color="rgba(41,121,255,0.4)"/>
      <stop offset="80%" stop-color="rgba(213,0,249,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,23,68,0.4)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Glow reflection on surface -->
  <rect x="30" y="155" width="340" height="30" rx="5" fill="url(#glow)" filter="url(#shadow)"/>
  <!-- LED strip PCB board -->
  <rect x="40" y="160" width="320" height="16" rx="3" fill="url(#board)" filter="url(#shadow)"/>
  <!-- LED chips on the strip -->
  <g>
    <rect x="50" y="163" width="8" height="10" rx="1" fill="#ff1744"/>
    <rect x="75" y="163" width="8" height="10" rx="1" fill="#ff5252"/>
    <rect x="100" y="163" width="8" height="10" rx="1" fill="#ffea00"/>
    <rect x="125" y="163" width="8" height="10" rx="1" fill="#76ff03"/>
    <rect x="150" y="163" width="8" height="10" rx="1" fill="#00e676"/>
    <rect x="175" y="163" width="8" height="10" rx="1" fill="#00bcd4"/>
    <rect x="200" y="163" width="8" height="10" rx="1" fill="#2979ff"/>
    <rect x="225" y="163" width="8" height="10" rx="1" fill="#7c4dff"/>
    <rect x="250" y="163" width="8" height="10" rx="1" fill="#d500f9"/>
    <rect x="275" y="163" width="8" height="10" rx="1" fill="#e040fb"/>
    <rect x="300" y="163" width="8" height="10" rx="1" fill="#ff1744"/>
    <rect x="325" y="163" width="8" height="10" rx="1" fill="#ff4081"/>
    <rect x="350" y="163" width="8" height="10" rx="1" fill="#ffea00"/>
  </g>
  <!-- Glow effect per LED -->
  <g opacity="0.3">
    <circle cx="54" cy="168" r="12" fill="#ff1744"/>
    <circle cx="104" cy="168" r="12" fill="#ffea00"/>
    <circle cx="154" cy="168" r="12" fill="#00e676"/>
    <circle cx="204" cy="168" r="12" fill="#2979ff"/>
    <circle cx="254" cy="168" r="12" fill="#d500f9"/>
    <circle cx="304" cy="168" r="12" fill="#ff1744"/>
    <circle cx="354" cy="168" r="12" fill="#ffea00"/>
  </g>
  <!-- Control unit (remote) -->
  <g filter="url(#shadow)">
    <rect x="155" y="210" width="90" height="55" rx="6" fill="#222"/>
    <rect x="160" y="215" width="80" height="8" rx="2" fill="#333"/>
    <!-- Buttons -->
    <circle cx="180" cy="238" r="7" fill="#333"/>
    <circle cx="200" cy="238" r="7" fill="#333"/>
    <circle cx="220" cy="238" r="7" fill="#333"/>
    <!-- LED indicator -->
    <circle cx="200" cy="215" r="2" fill="#ff1744"/>
    <!-- IR emitter at top -->
    <circle cx="155" cy="218" r="3" fill="#1a1a1a"/>
    <circle cx="155" cy="218" r="2" fill="#333"/>
  </g>
  <!-- Connection wire -->
  <path d="M 200 176 Q 200 195 200 210" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Pulsing glow animation (static representation) -->
  <rect x="40" y="160" width="320" height="16" rx="3" fill="url(#strip)" opacity="0.3"/>
  <!-- Price -->
  <rect x="140" y="290" width="120" height="26" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="307" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.7)">1 290 ₽</text>
</svg>
