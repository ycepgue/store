<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0ece4"/>
      <stop offset="100%" stop-color="#e4dcd0"/>
    </linearGradient>
    <linearGradient id="sole" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="shoeBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Left shoe (background, offset) -->
  <g filter="url(#shadow)" transform="translate(-15, -10) scale(0.85)">
    <path d="M 130 230 L 120 250 L 280 250 L 290 230 Z" fill="#333"/>
    <path d="M 120 250 L 280 250 L 285 260 L 125 260 Z" fill="#222"/>
    <path d="M 130 200 L 135 230 L 285 230 L 290 200 Z" fill="#d0d0d0"/>
    <path d="M 130 200 L 135 230 L 285 230 L 290 200 Z" fill="rgba(0,0,0,0.05)"/>
  </g>
  <!-- Right shoe (main) -->
  <g filter="url(#shadow)">
    <!-- Sole -->
    <path d="M 140 248 L 130 265 L 285 265 L 295 248 Z" fill="url(#sole)"/>
    <!-- Sole bottom / tread -->
    <path d="M 130 265 L 285 265 L 288 272 L 133 272 Z" fill="#111"/>
    <!-- Tread pattern -->
    <g fill="#1a1a1a">
      <rect x="145" y="267" width="8" height="4" rx="1"/>
      <rect x="160" y="267" width="8" height="4" rx="1"/>
      <rect x="175" y="267" width="8" height="4" rx="1"/>
      <rect x="190" y="267" width="8" height="4" rx="1"/>
      <rect x="205" y="267" width="8" height="4" rx="1"/>
      <rect x="220" y="267" width="8" height="4" rx="1"/>
      <rect x="235" y="267" width="8" height="4" rx="1"/>
      <rect x="250" y="267" width="8" height="4" rx="1"/>
      <rect x="265" y="267" width="8" height="4" rx="1"/>
    </g>
    <!-- Midsole -->
    <path d="M 135 240 L 140 248 L 295 248 L 290 240 Z" fill="#e0e0e0"/>
    <!-- Upper body -->
    <path d="M 145 190 L 135 240 L 290 240 L 295 190 Q 290 185 280 185 L 160 185 Q 150 185 145 190 Z" fill="url(#shoeBody)"/>
    <!-- Toe cap -->
    <path d="M 145 190 L 135 240 L 165 240 L 170 190 Z" fill="#f0f0f0"/>
    <!-- Heel counter -->
    <path d="M 270 190 L 290 240 L 295 190 Z" fill="#e0e0e0"/>
    <!-- Tongue -->
    <path d="M 190 175 L 185 200 L 225 200 L 220 175 Z" fill="url(#shoeBody)"/>
    <!-- Lace area -->
    <g fill="#d0d0d0">
      <circle cx="190" cy="195" r="2"/>
      <circle cx="210" cy="195" r="2"/>
      <circle cx="190" cy="205" r="2"/>
      <circle cx="210" cy="205" r="2"/>
      <circle cx="190" cy="215" r="2"/>
      <circle cx="210" cy="215" r="2"/>
    </g>
    <!-- Lace -->
    <path d="M 190 195 Q 200 200 210 195" fill="none" stroke="#f5f5f5" stroke-width="1.5"/>
    <path d="M 190 205 Q 200 210 210 205" fill="none" stroke="#f5f5f5" stroke-width="1.5"/>
    <path d="M 190 215 Q 200 220 210 215" fill="none" stroke="#f5f5f5" stroke-width="1.5"/>
    <!-- Swoosh / brand stripe -->
    <path d="M 155 215 Q 190 210 220 225 Q 240 235 260 225" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Ankle padding -->
    <path d="M 160 185 Q 180 178 200 178 Q 220 178 240 185" fill="none" stroke="#e8e8e8" stroke-width="4"/>
    <!-- Mesh dots -->
    <g fill="rgba(0,0,0,0.03)">
      <circle cx="175" cy="215" r="1.5"/><circle cx="185" cy="225" r="1.5"/>
      <circle cx="230" cy="215" r="1.5"/><circle cx="240" cy="225" r="1.5"/>
      <circle cx="195" cy="220" r="1.5"/><circle cx="220" cy="220" r="1.5"/>
    </g>
  </g>
  <!-- Price -->
  <rect x="140" y="295" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="312" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">8 990 ₽</text>
</svg>
