<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="100%" stop-color="#e0e0ea"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="15%" stop-color="#e8e8e8"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d0d0d0"/>
      <stop offset="75%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="20%" stop-color="#777"/>
      <stop offset="80%" stop-color="#666"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="steam" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Bottle body -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <path d="M 170 170 L 165 310 Q 165 320 200 320 Q 235 320 235 310 L 230 170 Z" fill="url(#body)"/>
    <!-- Bottom curve -->
    <ellipse cx="200" cy="315" rx="33" ry="6" fill="#999"/>
    <!-- Body highlight stripe -->
    <rect x="170" y="180" width="8" height="130" rx="4" fill="rgba(255,255,255,0.15)"/>
    <!-- Shoulder / neck transition -->
    <path d="M 170 170 L 180 140 L 220 140 L 230 170 Z" fill="url(#body)"/>
    <path d="M 180 140 L 220 140" stroke="#ccc" stroke-width="1"/>
    <!-- Neck -->
    <rect x="183" y="100" width="34" height="42" rx="4" fill="url(#body)"/>
    <!-- Cap -->
    <rect x="188" y="85" width="24" height="20" rx="5" fill="url(#cap)"/>
    <rect x="186" y="103" width="28" height="4" rx="2" fill="#555"/>
    <!-- Cap top detail -->
    <rect x="192" y="88" width="16" height="3" rx="1" fill="#888"/>
    <!-- Sleeve / grip area at bottom -->
    <path d="M 170 280 L 168 310 Q 168 318 200 318 Q 232 318 232 310 L 230 280 Z" fill="rgba(80,80,90,0.3)"/>
    <!-- Logo area -->
    <rect x="180" y="210" width="40" height="15" rx="3" fill="rgba(0,0,0,0.04)"/>
    <text x="200" y="221" font-size="8" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.15)">STEEL</text>
    <!-- Reflections -->
    <path d="M 178 150 L 176 270" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <path d="M 222 150 L 224 270" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
  </g>
  <!-- Steam/heat waves -->
  <g opacity="0.3">
    <path d="M 195 75 Q 190 65 195 55 Q 200 45 195 35" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 205 78 Q 210 68 205 58 Q 200 48 205 38" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Temperature indicator -->
  <text x="200" y="145" font-size="7" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.15)">12h heat retention</text>
  <!-- Capacity -->
  <text x="200" y="340" font-size="10" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.2)">1 L</text>
  <!-- Price -->
  <rect x="140" y="360" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="377" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">1 990 ₽</text>
</svg>
