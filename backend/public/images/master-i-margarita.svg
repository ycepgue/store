<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0f5"/>
      <stop offset="100%" stop-color="#e8e0e8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e8d48b"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <g filter="url(#shadow)">
    <!-- Pages -->
    <path d="M 165 90 L 245 95 L 230 290 L 150 285 Z" fill="#f5f0e0"/>
    <g stroke="rgba(0,0,0,0.04)" stroke-width="0.5">
      <line x1="155" y1="120" x2="238" y2="125"/>
      <line x1="154" y1="140" x2="236" y2="145"/>
      <line x1="153" y1="160" x2="234" y2="165"/>
      <line x1="152" y1="180" x2="232" y2="185"/>
      <line x1="151" y1="200" x2="230" y2="205"/>
      <line x1="150" y1="220" x2="229" y2="225"/>
      <line x1="150" y1="240" x2="228" y2="245"/>
      <line x1="149" y1="260" x2="227" y2="265"/>
    </g>
    <!-- Front cover -->
    <path d="M 170 85 L 255 90 L 240 285 L 155 280 Z" fill="url(#cover)"/>
    <!-- Ornate border -->
    <rect x="178" y="100" width="60" height="170" rx="2" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
    <!-- Decorative corners -->
    <g stroke="url(#gold)" stroke-width="0.5" fill="none">
      <path d="M 178 100 L 185 100 L 185 107"/>
      <path d="M 238 100 L 231 100 L 231 107"/>
      <path d="M 178 270 L 185 270 L 185 263"/>
      <path d="M 238 270 L 231 270 L 231 263"/>
    </g>
    <!-- Title -->
    <text x="207" y="145" font-size="12" font-family="Arial,sans-serif" font-weight="bold" fill="url(#gold)" text-anchor="middle">МАСТЕР</text>
    <text x="207" y="160" font-size="12" font-family="Arial,sans-serif" font-weight="bold" fill="url(#gold)" text-anchor="middle">И</text>
    <text x="207" y="175" font-size="12" font-family="Arial,sans-serif" font-weight="bold" fill="url(#gold)" text-anchor="middle">МАРГАРИТА</text>
    <!-- Decorative line -->
    <line x1="190" y1="185" x2="225" y2="185" stroke="url(#gold)" stroke-width="0.5"/>
    <!-- Moon illustration -->
    <circle cx="207" cy="215" r="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <path d="M 200 210 Q 207 210 207 218 Q 207 225 200 222 Q 206 218 200 210 Z" fill="rgba(255,255,255,0.1)"/>
    <!-- Author -->
    <text x="207" y="248" font-size="7" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.4)" text-anchor="middle">Михаил Булгаков</text>
    <!-- Spine -->
    <path d="M 165 90 L 170 85 L 155 280 L 150 285 Z" fill="#0a0a0a"/>
    <line x1="160" y1="95" x2="152" y2="280" stroke="url(#gold)" stroke-width="0.5"/>
  </g>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">590 ₽</text>
</svg>
