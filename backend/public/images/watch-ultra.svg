<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <radialGradient id="watchFace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="70%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="30%" stop-color="#e8d48b"/>
      <stop offset="60%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a7030"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d5016"/>
      <stop offset="100%" stop-color="#1a3a0a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4fc3f7" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Band top -->
  <rect x="160" y="55" width="80" height="55" rx="6" fill="url(#band)" filter="url(#shadow)"/>
  <rect x="162" y="55" width="76" height="10" rx="3" fill="#2a4a12"/>
  <!-- Watch body -->
  <g filter="url(#shadow)">
    <!-- Outer bezel -->
    <circle cx="200" cy="185" r="72" fill="url(#bezel)"/>
    <!-- Inner bezel / bezel ring -->
    <circle cx="200" cy="185" r="66" fill="#1a1a1a"/>
    <circle cx="200" cy="185" r="64" fill="url(#watchFace)"/>
    <!-- Watch face elements -->
    <!-- Minute markers -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1.5">
      <line x1="200" y1="125" x2="200" y2="132"/>
      <line x1="263" y1="185" x2="256" y2="185"/>
      <line x1="200" y1="245" x2="200" y2="238"/>
      <line x1="137" y1="185" x2="144" y2="185"/>
    </g>
    <!-- Hour markers -->
    <g stroke="rgba(255,255,255,0.8)" stroke-width="2.5">
      <line x1="200" y1="125" x2="200" y2="130"/>
      <line x1="262" y1="185" x2="255" y2="185"/>
      <line x1="200" y1="245" x2="200" y2="240"/>
      <line x1="138" y1="185" x2="145" y2="185"/>
    </g>
    <!-- Hands -->
    <line x1="200" y1="185" x2="200" y2="145" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="185" x2="225" y2="175" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="200" cy="185" r="4" fill="#4fc3f7"/>
    <!-- Date display -->
    <rect x="180" y="205" width="40" height="14" rx="3" fill="rgba(0,0,0,0.3)"/>
    <text x="200" y="215" font-size="9" font-family="Arial,sans-serif" text-anchor="middle" fill="#4fc3f7">16 ИЮЛ</text>
    <!-- Bottom text -->
    <text x="200" y="230" font-size="7" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.3)">PULSE 72 BPM</text>
    <!-- Crown -->
    <rect x="272" y="170" width="10" height="20" rx="4" fill="url(#bezel)"/>
    <rect x="273" y="175" width="8" height="2" rx="1" fill="#a08030"/>
    <rect x="273" y="183" width="8" height="2" rx="1" fill="#a08030"/>
    <!-- Side button -->
    <rect x="272" y="155" width="8" height="8" rx="2" fill="#c9a84c"/>
  </g>
  <!-- Band bottom -->
  <rect x="160" y="257" width="80" height="55" rx="6" fill="url(#band)" filter="url(#shadow)"/>
  <rect x="162" y="302" width="76" height="10" rx="3" fill="#2a4a12"/>
  <!-- Buckle -->
  <rect x="190" y="280" width="20" height="12" rx="2" fill="#c9a84c"/>
  <rect x="196" y="282" width="8" height="8" rx="1" fill="#e8d48b"/>
  <!-- Price -->
  <rect x="140" y="330" width="120" height="26" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="347" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.7)">59 990 ₽</text>
</svg>
