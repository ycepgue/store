<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e8"/>
      <stop offset="100%" stop-color="#d5ecd5"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="fabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Grass at bottom -->
  <g fill="#7cb342" opacity="0.3">
    <rect x="0" y="340" width="400" height="60"/>
    <rect x="0" y="340" width="400" height="60" fill="#8bc34a" opacity="0.2"/>
  </g>
  <g filter="url(#shadow)">
    <!-- Back legs -->
    <line x1="155" y1="120" x2="145" y2="290" stroke="url(#metal)" stroke-width="6" stroke-linecap="round"/>
    <line x1="245" y1="120" x2="255" y2="290" stroke="url(#metal)" stroke-width="6" stroke-linecap="round"/>
    <!-- Front legs -->
    <line x1="170" y1="180" x2="155" y2="300" stroke="url(#metal)" stroke-width="5" stroke-linecap="round"/>
    <line x1="230" y1="180" x2="245" y2="300" stroke="url(#metal)" stroke-width="5" stroke-linecap="round"/>
    <!-- Cross brace back -->
    <line x1="150" y1="220" x2="250" y2="220" stroke="url(#metal)" stroke-width="3" stroke-linecap="round"/>
    <!-- Cross brace front -->
    <line x1="162" y1="240" x2="238" y2="240" stroke="url(#metal)" stroke-width="3" stroke-linecap="round"/>
    <!-- Seat frame (bottom) -->
    <path d="M 160 180 L 240 180 L 245 190 L 155 190 Z" fill="none" stroke="url(#metal)" stroke-width="4" stroke-linecap="round"/>
    <!-- Fabric seat -->
    <path d="M 158 178 L 242 178 L 244 192 L 156 192 Z" fill="url(#fabric)" opacity="0.9"/>
    <!-- Seat fabric fold -->
    <path d="M 158 178 L 242 178" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <!-- Back frame -->
    <path d="M 155 120 L 245 120" stroke="url(#metal)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 155 120 L 155 175" stroke="url(#metal)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 245 120 L 245 175" stroke="url(#metal)" stroke-width="4" stroke-linecap="round"/>
    <!-- Back support bars -->
    <line x1="155" y1="135" x2="245" y2="135" stroke="url(#metal)" stroke-width="3" stroke-linecap="round"/>
    <line x1="155" y1="155" x2="245" y2="155" stroke="url(#metal)" stroke-width="3" stroke-linecap="round"/>
    <!-- Armrest left -->
    <path d="M 155 140 L 170 175" stroke="url(#metal)" stroke-width="4" stroke-linecap="round"/>
    <!-- Armrest right -->
    <path d="M 245 140 L 230 175" stroke="url(#metal)" stroke-width="4" stroke-linecap="round"/>
    <!-- Foot rest bar -->
    <line x1="155" y1="270" x2="245" y2="270" stroke="url(#metal)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Price -->
  <rect x="140" y="340" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="357" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">1 990 ₽</text>
</svg>
