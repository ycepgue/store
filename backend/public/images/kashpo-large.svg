<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f5f0"/>
      <stop offset="100%" stop-color="#e0e8e0"/>
    </linearGradient>
    <linearGradient id="pot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4744a"/>
      <stop offset="30%" stop-color="#c06030"/>
      <stop offset="100%" stop-color="#a04820"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d7a2d"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="soil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Pot body -->
  <g filter="url(#shadow)">
    <path d="M 150 160 L 140 290 Q 140 300 200 300 Q 260 300 260 290 L 250 160 Z" fill="url(#pot)"/>
    <!-- Pot rim -->
    <rect x="140" y="155" width="120" height="14" rx="3" fill="#c06030"/>
    <rect x="140" y="155" width="120" height="14" rx="3" fill="rgba(0,0,0,0.05)"/>
    <!-- Ceramic texture -->
    <path d="M 155 180 Q 160 185 155 190" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <path d="M 240 210 Q 235 215 240 220" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <path d="M 160 250 Q 165 255 160 260" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <!-- Pot highlight -->
    <path d="M 155 170 L 150 285" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
  </g>
  <!-- Soil (visible at top) -->
  <ellipse cx="200" cy="162" rx="55" ry="8" fill="url(#soil)"/>
  <!-- Plant stems -->
  <g stroke="#2d7a2d" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 190 162 Q 180 120 170 90"/>
    <path d="M 200 162 Q 210 110 220 70"/>
    <path d="M 195 162 Q 160 115 145 80"/>
    <path d="M 205 162 Q 240 105 260 85"/>
    <path d="M 192 162 Q 185 100 195 60"/>
  </g>
  <!-- Leaves -->
  <g filter="url(#shadow)">
    <!-- Large leaves -->
    <ellipse cx="155" cy="85" rx="25" ry="10" fill="url(#leaf1)" transform="rotate(-30, 155, 85)"/>
    <ellipse cx="235" cy="75" rx="28" ry="10" fill="url(#leaf2)" transform="rotate(25, 235, 75)"/>
    <ellipse cx="185" cy="60" rx="22" ry="9" fill="url(#leaf1)" transform="rotate(-10, 185, 60)"/>
    <ellipse cx="210" cy="55" rx="20" ry="8" fill="url(#leaf2)" transform="rotate(15, 210, 55)"/>
    <ellipse cx="140" cy="95" rx="18" ry="8" fill="url(#leaf1)" transform="rotate(-50, 140, 95)"/>
    <ellipse cx="260" cy="95" rx="20" ry="8" fill="url(#leaf2)" transform="rotate(50, 260, 95)"/>
    <ellipse cx="200" cy="65" rx="18" ry="7" fill="url(#leaf1)" transform="rotate(5, 200, 65)"/>
    <!-- Leaf veins -->
    <line x1="150" y1="85" x2="165" y2="80" stroke="rgba(0,80,0,0.15)" stroke-width="0.5"/>
    <line x1="230" y1="75" x2="245" y2="70" stroke="rgba(0,80,0,0.15)" stroke-width="0.5"/>
  </g>
  <!-- Small flower buds -->
  <circle cx="155" cy="78" r="4" fill="#e91e63"/>
  <circle cx="155" cy="78" r="2" fill="#f48fb1"/>
  <circle cx="215" cy="52" r="3.5" fill="#f44336"/>
  <circle cx="215" cy="52" r="1.8" fill="#ffcdd2"/>
  <circle cx="260" cy="88" r="3" fill="#9c27b0"/>
  <circle cx="260" cy="88" r="1.5" fill="#ce93d8"/>
  <!-- Price -->
  <rect x="140" y="320" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="337" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">2 490 ₽</text>
</svg>
