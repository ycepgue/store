<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0f5"/>
      <stop offset="100%" stop-color="#e8e0e8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#311b92"/>
      <stop offset="50%" stop-color="#4527a0"/>
      <stop offset="100%" stop-color="#1a0a5e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <g filter="url(#shadow)">
    <!-- Pages -->
    <path d="M 165 90 L 245 95 L 230 290 L 150 285 Z" fill="#f5f0e0"/>
    <g stroke="rgba(0,0,0,0.04)" stroke-width="0.5">
      <line x1="155" y1="120" x2="238" y2="125"/>
      <line x1="154" y1="140" x2="236" y2="145"/>
      <line x1="153" y1="160" x2="234" y2="165"/>
      <line x1="152" y1="180" x2="232" y2="185"/>
      <line x1="151" y1="200" x2="230" y2="205"/>
      <line x1="150" y1="220" x2="229" y2="225"/>
      <line x1="150" y1="240" x2="228" y2="245"/>
      <line x1="149" y1="260" x2="227" y2="265"/>
    </g>
    <!-- Front cover -->
    <path d="M 170 85 L 255 90 L 240 285 L 155 280 Z" fill="url(#cover)"/>
    <!-- Title -->
    <text x="207" y="135" font-size="11" font-family="Arial,sans-serif" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle">ДУМАЙ</text>
    <text x="207" y="149" font-size="11" font-family="Arial,sans-serif" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle">МЕДЛЕННО</text>
    <text x="207" y="165" font-size="9" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.6)" text-anchor="middle">РЕШАЙ БЫСТРО</text>
    <!-- Brain illustration -->
    <g fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5">
      <path d="M 195 195 Q 190 185 195 180 Q 200 175 207 175 Q 214 175 219 180 Q 224 185 219 195 Q 214 205 207 205 Q 200 205 195 195 Z"/>
    </g>
    <!-- Brain hemispheres -->
    <path d="M 207 180 Q 207 195 207 205" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <!-- Brain folds -->
    <g stroke="rgba(255,255,255,0.06)" stroke-width="0.3" fill="none">
      <path d="M 198 185 Q 200 190 198 193"/>
      <path d="M 216 185 Q 214 190 216 193"/>
    </g>
    <!-- Author -->
    <text x="207" y="230" font-size="6" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.4)" text-anchor="middle">Даниэль Канеман</text>
    <!-- Nobel prize badge -->
    <rect x="182" y="240" width="50" height="10" rx="2" fill="rgba(255,215,0,0.12)"/>
    <text x="207" y="248" font-size="5" font-family="Arial,sans-serif" fill="rgba(255,215,0,0.7)" text-anchor="middle">НОБЕЛЕВСКИЙ ЛАУРЕАТ</text>
    <!-- Spine -->
    <path d="M 165 90 L 170 85 L 155 280 L 150 285 Z" fill="#1a0a5e"/>
  </g>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">990 ₽</text>
</svg>
