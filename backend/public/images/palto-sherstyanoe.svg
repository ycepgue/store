<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0ece4"/>
      <stop offset="100%" stop-color="#e4dcd0"/>
    </linearGradient>
    <linearGradient id="coat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3728"/>
      <stop offset="50%" stop-color="#5c4433"/>
      <stop offset="100%" stop-color="#3a2818"/>
    </linearGradient>
    <linearGradient id="coatDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Coat body -->
    <path d="M 155 90 L 145 110 L 148 280 L 252 280 L 255 110 L 245 90 Z" fill="url(#coat)"/>
    <!-- Left side overlap -->
    <path d="M 155 90 L 145 110 L 148 280 L 195 280 L 195 90 Z" fill="url(#coatDark)"/>
    <!-- Left lapel -->
    <path d="M 155 90 L 170 130 L 195 110 L 195 90 Z" fill="url(#coat)"/>
    <!-- Right lapel -->
    <path d="M 245 90 L 230 130 L 205 110 L 205 90 Z" fill="url(#coat)"/>
    <!-- Notch line -->
    <path d="M 170 130 L 195 110" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <path d="M 230 130 L 205 110" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <!-- Collar -->
    <path d="M 150 85 Q 185 75 200 78 Q 215 75 250 85" fill="url(#coatDark)"/>
    <!-- Buttons -->
    <circle cx="180" cy="155" r="4" fill="#1a1a1a"/>
    <circle cx="180" cy="185" r="4" fill="#1a1a1a"/>
    <circle cx="180" cy="215" r="4" fill="#1a1a1a"/>
    <circle cx="180" cy="245" r="4" fill="#1a1a1a"/>
    <!-- Button shine -->
    <circle cx="179" cy="154" r="1.5" fill="rgba(255,255,255,0.1)"/>
    <circle cx="179" cy="184" r="1.5" fill="rgba(255,255,255,0.1)"/>
    <circle cx="179" cy="214" r="1.5" fill="rgba(255,255,255,0.1)"/>
    <circle cx="179" cy="244" r="1.5" fill="rgba(255,255,255,0.1)"/>
    <!-- Pockets -->
    <rect x="210" y="190" width="30" height="3" rx="1" fill="rgba(0,0,0,0.15)"/>
    <rect x="210" y="220" width="30" height="3" rx="1" fill="rgba(0,0,0,0.15)"/>
    <!-- Shoulder seams -->
    <path d="M 155 90 Q 165 100 175 95" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <path d="M 245 90 Q 235 100 225 95" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <!-- Vertical seam lines -->
    <line x1="200" y1="110" x2="200" y2="280" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
    <!-- Bottom hem -->
    <path d="M 148 278 Q 200 285 252 278" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
  </g>
  <!-- Price -->
  <rect x="140" y="300" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="317" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">24 990 ₽</text>
</svg>
