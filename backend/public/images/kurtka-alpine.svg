<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#4a2820"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="50%" stop-color="#264d7a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a7a60"/>
      <stop offset="100%" stop-color="#6b5b45"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Snowflakes -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="50" cy="50" r="2"/><circle cx="120" cy="80" r="1.5"/>
    <circle cx="350" cy="60" r="2"/><circle cx="300" cy="120" r="1.5"/>
    <circle cx="70" cy="200" r="1.5"/><circle cx="340" cy="250" r="2"/>
    <circle cx="30" cy="320" r="1.5"/><circle cx="370" cy="350" r="1.5"/>
    <circle cx="380" cy="180" r="1"/>
  </g>
  <!-- Jacket body -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <path d="M 150 100 L 150 280 L 250 280 L 250 100 L 230 80 L 220 70 L 200 65 L 180 70 L 170 80 Z" fill="url(#jacket)"/>
    <!-- Left arm -->
    <path d="M 150 100 L 120 180 L 115 280 L 135 280 L 145 180 L 155 100 Z" fill="url(#jacket)"/>
    <!-- Right arm -->
    <path d="M 250 100 L 280 180 L 285 280 L 265 280 L 255 180 L 245 100 Z" fill="url(#jacket)"/>
    <!-- Hood -->
    <path d="M 160 90 Q 160 50 200 45 Q 240 50 240 90 L 230 85 Q 200 70 170 85 Z" fill="url(#jacket)"/>
    <!-- Fur trim on hood -->
    <path d="M 158 88 Q 165 60 200 55 Q 235 60 242 88" fill="none" stroke="url(#fur)" stroke-width="6" stroke-linecap="round"/>
    <!-- Zipper line -->
    <line x1="200" y1="100" x2="200" y2="280" stroke="#333" stroke-width="2"/>
    <!-- Zipper teeth -->
    <g fill="#555"><rect x="197" y="110" width="6" height="2" rx="1"/><rect x="197" y="120" width="6" height="2" rx="1"/><rect x="197" y="130" width="6" height="2" rx="1"/><rect x="197" y="140" width="6" height="2" rx="1"/><rect x="197" y="150" width="6" height="2" rx="1"/><rect x="197" y="160" width="6" height="2" rx="1"/><rect x="197" y="170" width="6" height="2" rx="1"/><rect x="197" y="180" width="6" height="2" rx="1"/><rect x="197" y="190" width="6" height="2" rx="1"/><rect x="197" y="200" width="6" height="2" rx="1"/><rect x="197" y="210" width="6" height="2" rx="1"/><rect x="197" y="220" width="6" height="2" rx="1"/></g>
    <!-- Pockets -->
    <rect x="158" y="200" width="30" height="25" rx="3" fill="rgba(0,0,0,0.15)"/>
    <rect x="212" y="200" width="30" height="25" rx="3" fill="rgba(0,0,0,0.15)"/>
    <!-- Pocket flaps -->
    <rect x="158" y="200" width="30" height="8" rx="2" fill="rgba(0,0,0,0.2)"/>
    <rect x="212" y="200" width="30" height="8" rx="2" fill="rgba(0,0,0,0.2)"/>
    <!-- Left sleeve stripes -->
    <line x1="122" y1="220" x2="138" y2="220" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <line x1="124" y1="230" x2="140" y2="230" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <!-- Right sleeve stripes -->
    <line x1="260" y1="220" x2="278" y2="220" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <line x1="258" y1="230" x2="276" y2="230" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <!-- Bottom hem -->
    <path d="M 148 280 Q 170 290 200 288 Q 230 290 252 280" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="3"/>
  </g>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.7)">15 990 ₽</text>
</svg>
