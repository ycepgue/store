<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="50%" stop-color="#2e86c1"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="0"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#4fc3f7" flood-opacity="0.15"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Subtle pattern overlay -->
  <rect width="400" height="400" rx="24" fill="url(#bg)" opacity="0.3"/>
  <!-- Phone body -->
  <rect x="145" y="55" width="110" height="290" rx="24" fill="url(#phone)" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="153" y="75" width="94" height="230" rx="6" fill="url(#screen)" filter="url(#innerGlow)"/>
  <!-- Status bar -->
  <rect x="158" y="80" width="84" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="158" y="80" width="30" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Camera island (top) -->
  <rect x="180" y="68" width="40" height="8" rx="4" fill="#1a1a1a"/>
  <circle cx="192" cy="72" r="2.5" fill="#2d2d2d"/>
  <circle cx="200" cy="72" r="2.5" fill="#1a1a1a"/>
  <circle cx="208" cy="72" r="2.5" fill="#2d2d2d"/>
  <!-- App icons on screen -->
  <rect x="162" y="120" width="18" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="186" y="120" width="18" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="210" y="120" width="18" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="162" y="144" width="18" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="186" y="144" width="18" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="210" y="144" width="18" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Camera lenses (back, visible at top-left) -->
  <circle cx="235" cy="82" r="8" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <circle cx="235" cy="82" r="5" fill="#0d0d0d"/>
  <circle cx="237" cy="80" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Flash -->
  <rect x="228" y="70" width="6" height="3" rx="1.5" fill="#333"/>
  <!-- Home button / indicator -->
  <rect x="185" y="320" width="30" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Side buttons -->
  <rect x="255" y="140" width="3" height="20" rx="1.5" fill="#333"/>
  <rect x="255" y="170" width="3" height="40" rx="1.5" fill="#333"/>
  <!-- Bottom speaker -->
  <rect x="175" y="330" width="20" height="2" rx="1" fill="#333"/>
  <rect x="200" y="330" width="10" height="2" rx="1" fill="#333"/>
  <!-- Reflection overlay -->
  <rect x="145" y="55" width="55" height="290" rx="24" fill="rgba(255,255,255,0.03)"/>
  <!-- Price badge -->
  <rect x="140" y="365" width="120" height="26" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="382" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.7)">89 990 ₽</text>
</svg>
