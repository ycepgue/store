<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f0e8"/>
      <stop offset="100%" stop-color="#d5e8d5"/>
    </linearGradient>
    <linearGradient id="mat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a5a8a"/>
      <stop offset="30%" stop-color="#3a7ab5"/>
      <stop offset="70%" stop-color="#2a6a9a"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
    <linearGradient id="matHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Floor suggestion -->
  <rect x="0" y="280" width="400" height="120" fill="#c8b098" opacity="0.2"/>
  
  <!-- Yoga mat rolled -->
  <g filter="url(#shadow)">
    <!-- Main mat (rolled) -->
    <rect x="60" y="140" width="280" height="85" rx="8" fill="url(#mat)"/>
    <rect x="60" y="140" width="280" height="85" rx="8" fill="url(#matHighlight)"/>
    <!-- Left roll -->
    <ellipse cx="68" cy="182" rx="12" ry="42" fill="#1a4a7a"/>
    <ellipse cx="68" cy="182" rx="8" ry="38" fill="#2a5a8a"/>
    <ellipse cx="68" cy="182" rx="5" ry="35" fill="#3a7ab5"/>
    <!-- Right roll -->
    <ellipse cx="332" cy="182" rx="12" ry="42" fill="#1a4a7a"/>
    <ellipse cx="332" cy="182" rx="8" ry="38" fill="#2a5a8a"/>
    <ellipse cx="332" cy="182" rx="5" ry="35" fill="#3a7ab5"/>
    <!-- Mat texture lines -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
      <line x1="80" y1="152" x2="320" y2="152"/>
      <line x1="80" y1="160" x2="320" y2="160"/>
      <line x1="80" y1="168" x2="320" y2="168"/>
      <line x1="80" y1="176" x2="320" y2="176"/>
      <line x1="80" y1="184" x2="320" y2="184"/>
      <line x1="80" y1="192" x2="320" y2="192"/>
      <line x1="80" y1="200" x2="320" y2="200"/>
      <line x1="80" y1="208" x2="320" y2="208"/>
    </g>
    <!-- Strap -->
    <rect x="185" y="148" width="30" height="70" rx="2" fill="#4a7a2a"/>
    <rect x="185" y="148" width="30" height="70" rx="2" fill="rgba(255,255,255,0.05)"/>
    <!-- Strap buckle -->
    <rect x="190" y="175" width="20" height="10" rx="2" fill="#555"/>
    <rect x="194" y="178" width="12" height="6" rx="1" fill="#777"/>
    <!-- Carry handle suggestion -->
    <path d="M 190 148 Q 200 138 210 148" fill="none" stroke="#4a7a2a" stroke-width="3"/>
  </g>
  
  <!-- Small incense / ambiance -->
  <circle cx="100" cy="260" r="3" fill="#e74c3c" opacity="0.3"/>
  <circle cx="100" cy="255" r="2" fill="#e74c3c" opacity="0.2"/>
  <circle cx="100" cy="252" r="1" fill="#e74c3c" opacity="0.1"/>
  
  <!-- Price -->
  <rect x="140" y="300" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="317" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">2 990 ₽</text>
</svg>
