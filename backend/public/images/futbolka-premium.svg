<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf3e0"/>
      <stop offset="100%" stop-color="#f0e6cc"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- T-shirt body -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <path d="M 150 90 L 140 100 L 148 110 L 148 260 L 252 260 L 252 110 L 260 100 L 250 90 Z" fill="url(#shirt)"/>
    <!-- Left sleeve -->
    <path d="M 150 90 L 110 130 L 120 150 L 145 120 Z" fill="url(#shirt)"/>
    <!-- Right sleeve -->
    <path d="M 250 90 L 290 130 L 280 150 L 255 120 Z" fill="url(#shirt)"/>
    <!-- Collar -->
    <path d="M 180 92 Q 200 108 220 92" fill="none" stroke="#d0d0d0" stroke-width="2"/>
    <path d="M 180 92 Q 200 105 220 92" fill="#e8e8e8"/>
    <!-- Collar ribbing -->
    <path d="M 182 93 Q 200 107 218 93" fill="none" stroke="#d5d5d5" stroke-width="0.5"/>
    <!-- Fold line -->
    <line x1="200" y1="100" x2="200" y2="260" stroke="rgba(0,0,0,0.03)" stroke-width="1"/>
    <!-- Fabric texture lines -->
    <g stroke="rgba(0,0,0,0.02)" stroke-width="0.5">
      <line x1="155" y1="140" x2="245" y2="140"/>
      <line x1="153" y1="160" x2="247" y2="160"/>
      <line x1="152" y1="180" x2="248" y2="180"/>
      <line x1="150" y1="200" x2="250" y2="200"/>
      <line x1="150" y1="220" x2="250" y2="220"/>
      <line x1="150" y1="240" x2="250" y2="240"/>
    </g>
    <!-- Small label -->
    <rect x="194" y="195" width="12" height="6" rx="1" fill="rgba(0,0,0,0.03)"/>
    <!-- Bottom hem -->
    <path d="M 148 258 Q 200 265 252 258" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="2"/>
  </g>
  <!-- Color swatches -->
  <text x="200" y="290" font-size="9" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.3)">доступно в 5 цветах</text>
  <circle cx="170" cy="305" r="8" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <circle cx="192" cy="305" r="8" fill="#1a1a2e"/>
  <circle cx="214" cy="305" r="8" fill="#e53935"/>
  <circle cx="236" cy="305" r="8" fill="#1565c0"/>
  <!-- Price -->
  <rect x="140" y="325" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="342" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">2 490 ₽</text>
</svg>
