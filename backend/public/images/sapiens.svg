<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0f5"/>
      <stop offset="100%" stop-color="#e8e0e8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5b0"/>
      <stop offset="50%" stop-color="#f0e0c0"/>
      <stop offset="100%" stop-color="#d8c0a0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <g filter="url(#shadow)">
    <!-- Pages -->
    <path d="M 165 90 L 245 95 L 230 290 L 150 285 Z" fill="#f5f0e0"/>
    <g stroke="rgba(0,0,0,0.04)" stroke-width="0.5">
      <line x1="155" y1="120" x2="238" y2="125"/>
      <line x1="154" y1="140" x2="236" y2="145"/>
      <line x1="153" y1="160" x2="234" y2="165"/>
      <line x1="152" y1="180" x2="232" y2="185"/>
      <line x1="151" y1="200" x2="230" y2="205"/>
      <line x1="150" y1="220" x2="229" y2="225"/>
      <line x1="150" y1="240" x2="228" y2="245"/>
      <line x1="149" y1="260" x2="227" y2="265"/>
    </g>
    <!-- Front cover -->
    <path d="M 170 85 L 255 90 L 240 285 L 155 280 Z" fill="url(#cover)"/>
    <!-- Cover border -->
    <rect x="178" y="100" width="60" height="170" rx="2" fill="none" stroke="#b89878" stroke-width="0.5"/>
    <!-- Title -->
    <text x="207" y="140" font-size="16" font-family="Arial,sans-serif" font-weight="bold" fill="#5d4037" text-anchor="middle">SAPIENS</text>
    <!-- Subtitle -->
    <text x="207" y="160" font-size="6" font-family="Arial,sans-serif" fill="#8d6e63" text-anchor="middle">Краткая история</text>
    <text x="207" y="169" font-size="6" font-family="Arial,sans-serif" fill="#8d6e63" text-anchor="middle">человечества</text>
    <!-- Evolution illustration -->
    <g fill="#a08060" opacity="0.15">
      <!-- Figure 1 - ape -->
      <circle cx="190" cy="205" r="4"/>
      <path d="M 188 210 Q 190 230 188 240"/>
      <!-- Figure 2 - early human -->
      <circle cx="207" cy="205" r="4"/>
      <path d="M 205 210 Q 207 230 205 240"/>
      <line x1="205" y1="215" x2="200" y2="225"/>
      <line x1="205" y1="215" x2="210" y2="225"/>
      <!-- Figure 3 - modern human -->
      <circle cx="224" cy="205" r="4"/>
      <path d="M 222 210 Q 224 230 222 240"/>
      <line x1="222" y1="215" x2="218" y2="225"/>
      <line x1="222" y1="215" x2="226" y2="225"/>
    </g>
    <!-- Arrow -->
    <path d="M 195 212 L 205 212" stroke="#a08060" stroke-width="0.5"/>
    <path d="M 212 212 L 220 212" stroke="#a08060" stroke-width="0.5"/>
    <!-- Author -->
    <text x="207" y="258" font-size="7" font-family="Arial,sans-serif" fill="#8d6e63" text-anchor="middle">Юваль Ной Харари</text>
    <!-- Spine -->
    <path d="M 165 90 L 170 85 L 155 280 L 150 285 Z" fill="#c8b090"/>
  </g>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">890 ₽</text>
</svg>
