<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0f5"/>
      <stop offset="100%" stop-color="#e8e0e8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#0d1452"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5f0e0"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <!-- Book 3D view -->
  <g filter="url(#shadow)">
    <!-- Pages (side view) -->
    <path d="M 165 90 L 245 95 L 230 290 L 150 285 Z" fill="url(#pages)"/>
    <path d="M 165 90 L 150 285" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <!-- Page lines -->
    <g stroke="rgba(0,0,0,0.04)" stroke-width="0.5">
      <line x1="155" y1="120" x2="238" y2="125"/>
      <line x1="154" y1="140" x2="236" y2="145"/>
      <line x1="153" y1="160" x2="234" y2="165"/>
      <line x1="152" y1="180" x2="232" y2="185"/>
      <line x1="151" y1="200" x2="230" y2="205"/>
      <line x1="150" y1="220" x2="229" y2="225"/>
      <line x1="150" y1="240" x2="228" y2="245"/>
      <line x1="149" y1="260" x2="227" y2="265"/>
    </g>
    <!-- Back cover -->
    <path d="M 165 90 L 250 95 L 235 290 L 150 285 Z" fill="#1a237e" opacity="0.3"/>
    <!-- Front cover -->
    <path d="M 165 90 L 170 85 L 255 90 L 250 95 Z" fill="#1a237e"/>
    <path d="M 170 85 L 255 90 L 240 285 L 155 280 Z" fill="url(#cover)"/>
    <!-- Cover border -->
    <rect x="175" y="100" width="65" height="170" rx="2" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Title on cover -->
    <text x="207" y="140" font-size="13" font-family="Arial,sans-serif" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle" transform="rotate(-2, 207, 140)">АТОМНЫЕ</text>
    <text x="207" y="156" font-size="13" font-family="Arial,sans-serif" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle" transform="rotate(-2, 207, 156)">ПРИВЫЧКИ</text>
    <!-- Subtitle -->
    <text x="207" y="178" font-size="6" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.4)" text-anchor="middle" transform="rotate(-2, 207, 178)">Джеймс Клир</text>
    <!-- Decorative circle -->
    <circle cx="207" cy="220" r="15" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="207" cy="220" r="10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <!-- Atomic icon -->
    <circle cx="207" cy="216" r="4" fill="rgba(255,255,255,0.15)"/>
    <ellipse cx="207" cy="224" rx="7" ry="2" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" transform="rotate(-30, 207, 224)"/>
    <ellipse cx="207" cy="224" rx="7" ry="2" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" transform="rotate(30, 207, 224)"/>
    <!-- Bestseller badge -->
    <rect x="178" y="240" width="58" height="12" rx="3" fill="rgba(255,215,0,0.15)"/>
    <text x="207" y="249" font-size="6" font-family="Arial,sans-serif" fill="rgba(255,215,0,0.8)" text-anchor="middle">БЕСТСЕЛЛЕР</text>
    <!-- Spine -->
    <path d="M 165 90 L 170 85 L 155 280 L 150 285 Z" fill="#0d1452"/>
  </g>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">790 ₽</text>
</svg>
