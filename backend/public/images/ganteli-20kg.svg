<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#f5e0cc"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="20%" stop-color="#ddd"/>
      <stop offset="40%" stop-color="#fff"/>
      <stop offset="60%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <linearGradient id="weight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="rubber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Barbell/dumbbell rack suggestion -->
  <g stroke="rgba(0,0,0,0.04)" stroke-width="1">
    <line x1="60" y1="290" x2="340" y2="290"/>
  </g>
  
  <!-- Left dumbbell -->
  <g filter="url(#shadow)">
    <!-- Handle -->
    <rect x="85" y="175" width="60" height="14" rx="7" fill="url(#chrome)"/>
    <!-- Handle knurling -->
    <g stroke="rgba(0,0,0,0.1)" stroke-width="0.5">
      <line x1="95" y1="177" x2="95" y2="187"/>
      <line x1="100" y1="177" x2="100" y2="187"/>
      <line x1="105" y1="177" x2="105" y2="187"/>
      <line x1="110" y1="177" x2="110" y2="187"/>
      <line x1="115" y1="177" x2="115" y2="187"/>
      <line x1="120" y1="177" x2="120" y2="187"/>
      <line x1="125" y1="177" x2="125" y2="187"/>
      <line x1="130" y1="177" x2="130" y2="187"/>
    </g>
    <!-- Weight plates left -->
    <rect x="72" y="158" width="18" height="48" rx="3" fill="url(#weight)"/>
    <rect x="75" y="158" width="12" height="48" rx="3" fill="url(#rubber)" opacity="0.3"/>
    <!-- Weight plates right -->
    <rect x="140" y="158" width="18" height="48" rx="3" fill="url(#weight)"/>
    <rect x="143" y="158" width="12" height="48" rx="3" fill="url(#rubber)" opacity="0.3"/>
    <!-- Plate detail lines -->
    <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
      <line x1="74" y1="168" x2="88" y2="168"/>
      <line x1="74" y1="180" x2="88" y2="180"/>
      <line x1="74" y1="192" x2="88" y2="192"/>
      <line x1="142" y1="168" x2="156" y2="168"/>
      <line x1="142" y1="180" x2="156" y2="180"/>
      <line x1="142" y1="192" x2="156" y2="192"/>
    </g>
    <!-- Collar -->
    <rect x="82" y="172" width="6" height="20" rx="1" fill="#888"/>
    <rect x="142" y="172" width="6" height="20" rx="1" fill="#888"/>
  </g>

  <!-- Right dumbbell (larger) -->
  <g filter="url(#shadow)">
    <!-- Handle -->
    <rect x="225" y="170" width="70" height="16" rx="8" fill="url(#chrome)"/>
    <!-- Handle knurling -->
    <g stroke="rgba(0,0,0,0.1)" stroke-width="0.5">
      <line x1="238" y1="172" x2="238" y2="184"/>
      <line x1="244" y1="172" x2="244" y2="184"/>
      <line x1="250" y1="172" x2="250" y2="184"/>
      <line x1="256" y1="172" x2="256" y2="184"/>
      <line x1="262" y1="172" x2="262" y2="184"/>
      <line x1="268" y1="172" x2="268" y2="184"/>
      <line x1="274" y1="172" x2="274" y2="184"/>
    </g>
    <!-- Weight plates left - more plates -->
    <rect x="200" y="150" width="18" height="56" rx="3" fill="#444"/>
    <rect x="204" y="150" width="10" height="56" rx="3" fill="#555"/>
    <rect x="210" y="150" width="18" height="56" rx="3" fill="#333"/>
    <!-- Weight plates right -->
    <rect x="302" y="150" width="18" height="56" rx="3" fill="#444"/>
    <rect x="306" y="150" width="10" height="56" rx="3" fill="#555"/>
    <rect x="312" y="150" width="18" height="56" rx="3" fill="#333"/>
    <!-- Plate detail -->
    <g stroke="rgba(255,255,255,0.05)" stroke-width="0.5">
      <line x1="202" y1="160" x2="216" y2="160"/>
      <line x1="202" y1="178" x2="216" y2="178"/>
      <line x1="202" y1="196" x2="216" y2="196"/>
      <line x1="304" y1="160" x2="318" y2="160"/>
      <line x1="304" y1="178" x2="318" y2="178"/>
      <line x1="304" y1="196" x2="318" y2="196"/>
    </g>
    <!-- Collar -->
    <rect x="222" y="168" width="6" height="20" rx="1" fill="#888"/>
    <rect x="292" y="168" width="6" height="20" rx="1" fill="#888"/>
  </g>
  
  <!-- Text label -->
  <text x="115" y="265" font-size="10" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.2)">10 кг</text>
  <text x="260" y="265" font-size="10" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.2)">20 кг</text>
  
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">7 990 ₽</text>
</svg>
