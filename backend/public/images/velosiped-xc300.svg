<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f0e0"/>
      <stop offset="100%" stop-color="#c5e0c5"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="tire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="50%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#8d6e63"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Sky gradient -->
  <rect x="0" y="0" width="400" height="200" fill="rgba(135,206,235,0.15)"/>
  <!-- Mountains -->
  <polygon points="0,200 60,120 120,200" fill="#8bc34a" opacity="0.1"/>
  <polygon points="80,200 160,100 240,200" fill="#66bb6a" opacity="0.08"/>
  <polygon points="200,200 290,110 380,200" fill="#8bc34a" opacity="0.1"/>
  <!-- Ground -->
  <rect x="0" y="280" width="400" height="120" fill="url(#ground)" opacity="0.3"/>
  
  <g filter="url(#shadow)">
    <!-- Rear wheel -->
    <circle cx="140" cy="252" r="50" fill="none" stroke="url(#tire)" stroke-width="6"/>
    <circle cx="140" cy="252" r="45" fill="none" stroke="#222" stroke-width="2"/>
    <circle cx="140" cy="252" r="3" fill="#888"/>
    <!-- Spokes rear -->
    <g stroke="#999" stroke-width="0.8">
      <line x1="140" y1="202" x2="140" y2="302"/>
      <line x1="90" y1="252" x2="190" y2="252"/>
      <line x1="105" y1="217" x2="175" y2="287"/>
      <line x1="105" y1="287" x2="175" y2="217"/>
    </g>
    <!-- Front wheel -->
    <circle cx="290" cy="252" r="50" fill="none" stroke="url(#tire)" stroke-width="6"/>
    <circle cx="290" cy="252" r="45" fill="none" stroke="#222" stroke-width="2"/>
    <circle cx="290" cy="252" r="3" fill="#888"/>
    <!-- Spokes front -->
    <g stroke="#999" stroke-width="0.8">
      <line x1="290" y1="202" x2="290" y2="302"/>
      <line x1="240" y1="252" x2="340" y2="252"/>
      <line x1="255" y1="217" x2="325" y2="287"/>
      <line x1="255" y1="287" x2="325" y2="217"/>
    </g>
    <!-- Frame - main triangle -->
    <g stroke="url(#frame)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Top tube -->
      <line x1="160" y1="175" x2="260" y2="185"/>
      <!-- Down tube -->
      <line x1="160" y1="175" x2="215" y2="245"/>
      <!-- Seat tube -->
      <line x1="160" y1="175" x2="140" y2="252"/>
      <!-- Chain stay -->
      <line x1="140" y1="252" x2="215" y2="245"/>
      <!-- Seat stay -->
      <line x1="140" y1="252" x2="160" y2="175"/>
    </g>
    <!-- Fork -->
    <line x1="260" y1="185" x2="290" y2="252" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <!-- Handlebar stem -->
    <line x1="260" y1="185" x2="270" y2="165" stroke="#888" stroke-width="3" stroke-linecap="round"/>
    <!-- Handlebars -->
    <line x1="255" y1="162" x2="280" y2="168" stroke="#888" stroke-width="3" stroke-linecap="round"/>
    <!-- Grips -->
    <line x1="253" y1="161" x2="255" y2="162" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <line x1="280" y1="168" x2="282" y2="169" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <!-- Seat post -->
    <line x1="160" y1="175" x2="155" y2="160" stroke="#888" stroke-width="3" stroke-linecap="round"/>
    <!-- Seat -->
    <ellipse cx="152" cy="158" rx="15" ry="5" fill="#333"/>
    <!-- Pedal crank -->
    <circle cx="215" cy="245" r="5" fill="#888"/>
    <!-- Pedals -->
    <line x1="205" y1="238" x2="225" y2="252" stroke="#666" stroke-width="2"/>
    <rect x="198" y="235" width="8" height="4" rx="1" fill="#555" transform="rotate(-35, 202, 237)"/>
    <!-- Chain -->
    <path d="M 215 245 Q 180 265 140 252" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Disc brake rotors -->
    <circle cx="140" cy="252" r="12" fill="none" stroke="#aaa" stroke-width="1"/>
    <circle cx="290" cy="252" r="12" fill="none" stroke="#aaa" stroke-width="1"/>
    <!-- Suspension fork detail -->
    <rect x="258" y="200" width="4" height="20" rx="2" fill="#777"/>
    <!-- Mud guard rear -->
    <path d="M 120 230 Q 140 215 160 230" fill="none" stroke="#555" stroke-width="2"/>
    <!-- Gear cassette -->
    <circle cx="140" cy="252" r="5" fill="none" stroke="#666" stroke-width="1.5"/>
  </g>
  <!-- Price -->
  <rect x="140" y="320" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="337" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">45 990 ₽</text>
</svg>
