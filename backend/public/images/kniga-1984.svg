<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0f5"/>
      <stop offset="100%" stop-color="#e8e0e8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="50%" stop-color="#d32f2f"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <!-- Book 3D view -->
  <g filter="url(#shadow)">
    <!-- Pages -->
    <path d="M 165 90 L 245 95 L 230 290 L 150 285 Z" fill="#f5f0e0"/>
    <g stroke="rgba(0,0,0,0.04)" stroke-width="0.5">
      <line x1="155" y1="120" x2="238" y2="125"/>
      <line x1="154" y1="140" x2="236" y2="145"/>
      <line x1="153" y1="160" x2="234" y2="165"/>
      <line x1="152" y1="180" x2="232" y2="185"/>
      <line x1="151" y1="200" x2="230" y2="205"/>
      <line x1="150" y1="220" x2="229" y2="225"/>
      <line x1="150" y1="240" x2="228" y2="245"/>
      <line x1="149" y1="260" x2="227" y2="265"/>
    </g>
    <!-- Front cover -->
    <path d="M 170 85 L 255 90 L 240 285 L 155 280 Z" fill="url(#cover)"/>
    <!-- Title -->
    <text x="207" y="155" font-size="28" font-family="Arial,sans-serif" font-weight="bold" fill="rgba(255,255,255,0.95)" text-anchor="middle">1984</text>
    <!-- Author -->
    <text x="207" y="180" font-size="8" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.5)" text-anchor="middle">Джордж Оруэлл</text>
    <!-- Eye symbol (Big Brother) -->
    <ellipse cx="207" cy="220" rx="18" ry="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <circle cx="207" cy="220" r="5" fill="rgba(255,255,255,0.1)"/>
    <circle cx="207" cy="220" r="2" fill="rgba(255,255,255,0.3)"/>
    <!-- Lower text -->
    <text x="207" y="250" font-size="5" font-family="Arial,sans-serif" fill="rgba(255,255,255,0.3)" text-anchor="middle">BIG BROTHER IS WATCHING</text>
    <!-- Spine -->
    <path d="M 165 90 L 170 85 L 155 280 L 150 285 Z" fill="#8b0000"/>
  </g>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">490 ₽</text>
</svg>
