<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="case" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="pod1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="pod2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="caseShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Charging case - bottom part -->
  <g filter="url(#caseShadow)">
    <rect x="130" y="195" width="140" height="90" rx="35" fill="url(#case)"/>
    <!-- Lid line -->
    <line x1="135" y1="220" x2="265" y2="220" stroke="#d0d0d0" stroke-width="1"/>
    <!-- Case inner shadow -->
    <rect x="130" y="195" width="140" height="90" rx="35" fill="rgba(0,0,0,0.02)"/>
  </g>
  <!-- Case lid (open, tilted back) -->
  <g filter="url(#caseShadow)">
    <ellipse cx="200" cy="185" rx="65" ry="15" fill="url(#case)"/>
    <path d="M 135 185 Q 135 160 200 160 Q 265 160 265 185" fill="url(#case)" stroke="#d0d0d0" stroke-width="0.5"/>
  </g>
  <!-- Left earbud -->
  <g filter="url(#shadow)">
    <!-- Stem -->
    <rect x="178" y="145" width="8" height="55" rx="4" fill="url(#pod1)"/>
    <!-- Bud body -->
    <ellipse cx="182" cy="145" rx="10" ry="14" fill="url(#pod1)"/>
    <!-- Speaker mesh -->
    <ellipse cx="182" cy="155" rx="6" ry="3" fill="#c0c0c0" opacity="0.3"/>
    <!-- Sensor -->
    <circle cx="182" cy="140" r="2" fill="#333" opacity="0.1"/>
  </g>
  <!-- Right earbud -->
  <g filter="url(#shadow)">
    <!-- Stem -->
    <rect x="214" y="145" width="8" height="55" rx="4" fill="url(#pod2)"/>
    <!-- Bud body -->
    <ellipse cx="218" cy="145" rx="10" ry="14" fill="url(#pod2)"/>
    <!-- Speaker mesh -->
    <ellipse cx="218" cy="155" rx="6" ry="3" fill="#c0c0c0" opacity="0.3"/>
    <!-- Sensor -->
    <circle cx="218" cy="140" r="2" fill="#333" opacity="0.1"/>
  </g>
  <!-- Charging indicator -->
  <circle cx="200" cy="240" r="3" fill="#4caf50" opacity="0.8"/>
  <circle cx="200" cy="240" r="3" fill="#4caf50" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Lightning port -->
  <ellipse cx="200" cy="280" rx="6" ry="2" fill="#999"/>
  <!-- Price -->
  <rect x="140" y="310" width="120" height="26" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="327" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.7)">24 990 ₽</text>
</svg>
