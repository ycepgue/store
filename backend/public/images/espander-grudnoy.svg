<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5ece0"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <linearGradient id="band1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="band2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="band3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  
  <!-- Resistance bands laid out -->
  <g filter="url(#shadow)">
    <!-- Band 1 - Red (heavy) -->
    <path d="M 90 180 Q 100 100 200 105 Q 300 100 310 180 Q 320 260 200 255 Q 80 260 90 180 Z" fill="none" stroke="url(#band1)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Band 2 - Green (medium) -->
    <path d="M 110 190 Q 120 120 200 125 Q 280 120 290 190 Q 300 250 200 245 Q 100 250 110 190 Z" fill="none" stroke="url(#band2)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Band 3 - Blue (light) -->
    <path d="M 130 198 Q 140 140 200 142 Q 260 140 270 198 Q 280 240 200 238 Q 120 240 130 198 Z" fill="none" stroke="url(#band3)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Handles -->
  <g filter="url(#shadow)">
    <!-- Left handle tube -->
    <rect x="60" y="160" width="25" height="45" rx="8" fill="url(#handle)"/>
    <rect x="62" y="165" width="21" height="35" rx="2" fill="#333"/>
    <!-- Handle texture -->
    <g stroke="#555" stroke-width="0.5">
      <line x1="65" y1="168" x2="80" y2="168"/>
      <line x1="65" y1="175" x2="80" y2="175"/>
      <line x1="65" y1="182" x2="80" y2="182"/>
      <line x1="65" y1="189" x2="80" y2="189"/>
      <line x1="65" y1="196" x2="80" y2="196"/>
    </g>
    <!-- Left strap -->
    <rect x="72" y="155" width="6" height="10" rx="1" fill="#666"/>
    
    <!-- Right handle tube -->
    <rect x="315" y="160" width="25" height="45" rx="8" fill="url(#handle)"/>
    <rect x="317" y="165" width="21" height="35" rx="2" fill="#333"/>
    <!-- Handle texture -->
    <g stroke="#555" stroke-width="0.5">
      <line x1="320" y1="168" x2="335" y2="168"/>
      <line x1="320" y1="175" x2="335" y2="175"/>
      <line x1="320" y1="182" x2="335" y2="182"/>
      <line x1="320" y1="189" x2="335" y2="189"/>
      <line x1="320" y1="196" x2="335" y2="196"/>
    </g>
    <!-- Right strap -->
    <rect x="322" y="155" width="6" height="10" rx="1" fill="#666"/>
  </g>
  
  <!-- Resistance labels -->
  <text x="200" y="105" font-size="9" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.2)">5 уровней нагрузки</text>
  
  <!-- Level indicators -->
  <rect x="160" y="115" width="8" height="8" rx="2" fill="#e53935"/>
  <rect x="175" y="115" width="8" height="8" rx="2" fill="#ff9800"/>
  <rect x="190" y="115" width="8" height="8" rx="2" fill="#43a047"/>
  <rect x="205" y="115" width="8" height="8" rx="2" fill="#1e88e5"/>
  <rect x="220" y="115" width="8" height="8" rx="2" fill="#9e9e9e"/>
  
  <!-- Price -->
  <rect x="140" y="290" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="307" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">890 ₽</text>
</svg>
