<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="tabletScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="30%" stop-color="#2196f3"/>
      <stop offset="70%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Tablet body -->
  <g filter="url(#shadow)">
    <rect x="110" y="50" width="180" height="250" rx="12" fill="url(#tablet)"/>
    <!-- Screen -->
    <rect x="118" y="62" width="164" height="220" rx="6" fill="url(#tabletScreen)"/>
    <!-- Screen content -->
    <!-- Gradient overlay -->
    <rect x="118" y="62" width="164" height="220" rx="6" fill="rgba(0,0,0,0.15)"/>
    <!-- Window/toolbar -->
    <rect x="125" y="68" width="150" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <!-- Content blocks -->
    <rect x="125" y="80" width="60" height="80" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="192" y="80" width="83" height="80" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="125" y="168" width="83" height="40" rx="4" fill="rgba(255,255,255,0.04)"/>
    <rect x="215" y="168" width="60" height="40" rx="4" fill="rgba(255,255,255,0.04)"/>
    <!-- Bottom toolbar -->
    <rect x="125" y="220" width="150" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="125" y="230" width="150" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
    <!-- Camera dot -->
    <circle cx="200" cy="58" r="2" fill="#333"/>
    <!-- Home indicator -->
    <rect x="175" y="275" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  </g>
  <!-- Stylus -->
  <g transform="rotate(-30, 330, 250)">
    <rect x="320" y="220" width="6" height="80" rx="3" fill="#e0e0e0" filter="url(#shadow)"/>
    <rect x="320" y="220" width="6" height="12" rx="3" fill="#333"/>
    <circle cx="323" cy="225" r="1" fill="#666"/>
  </g>
  <!-- Price -->
  <rect x="140" y="315" width="120" height="26" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="332" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(255,255,255,0.7)">49 990 ₽</text>
</svg>
