<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <linearGradient id="jeans" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="50%" stop-color="#2a5298"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Waistband -->
    <rect x="140" y="62" width="120" height="18" rx="3" fill="#1a3a6b"/>
    <rect x="140" y="62" width="120" height="18" rx="3" fill="rgba(0,0,0,0.1)"/>
    <!-- Belt loops -->
    <rect x="150" y="62" width="6" height="18" rx="1" fill="#24477a"/>
    <rect x="194" y="62" width="6" height="18" rx="1" fill="#24477a"/>
    <rect x="240" y="62" width="6" height="18" rx="1" fill="#24477a"/>
    <!-- Left leg -->
    <path d="M 140 80 L 130 250 L 142 350 L 192 350 L 200 250 L 200 80 Z" fill="url(#jeans)"/>
    <!-- Right leg -->
    <path d="M 200 80 L 200 250 L 208 350 L 258 350 L 270 250 L 260 80 Z" fill="url(#jeans)"/>
    <!-- Crotch -->
    <path d="M 200 80 L 200 130" fill="none" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Left pocket -->
    <path d="M 150 90 L 150 130 Q 155 140 175 135 L 185 100" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <!-- Right pocket -->
    <path d="M 215 100 L 225 135 Q 245 140 250 130 L 250 90" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <!-- Back pockets -->
    <rect x="158" y="160" width="28" height="30" rx="3" fill="rgba(0,0,0,0.08)" transform="rotate(-5, 172, 175)"/>
    <rect x="215" y="160" width="28" height="30" rx="3" fill="rgba(0,0,0,0.08)" transform="rotate(5, 229, 175)"/>
    <!-- Stitching on back pockets -->
    <rect x="161" y="163" width="22" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" transform="rotate(-5, 172, 175)"/>
    <rect x="218" y="163" width="22" height="24" rx="2" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" transform="rotate(5, 229, 175)"/>
    <!-- Fly / zipper -->
    <line x1="195" y1="80" x2="195" y2="120" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <circle cx="195" cy="82" r="1.5" fill="#c9a84c"/>
    <!-- Knee whiskers -->
    <g fill="rgba(255,255,255,0.03)">
      <line x1="145" y1="210" x2="195" y2="210" stroke-width="1"/>
      <line x1="205" y1="210" x2="255" y2="210" stroke-width="1"/>
    </g>
    <!-- Bottom hem left -->
    <path d="M 142 350 L 192 350" stroke="#1a3a6b" stroke-width="4"/>
    <!-- Bottom hem right -->
    <path d="M 208 350 L 258 350" stroke="#1a3a6b" stroke-width="4"/>
    <!-- Distressing / whiskering -->
    <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
      <path d="M 150 150 L 180 145" fill="none"/>
      <path d="M 220 150 L 250 145" fill="none"/>
    </g>
  </g>
  <!-- Price -->
  <rect x="140" y="365" width="120" height="26" rx="6" fill="rgba(0,0,0,0.05)"/>
  <text x="200" y="382" font-size="12" font-family="Arial,sans-serif" text-anchor="middle" fill="rgba(0,0,0,0.6)">5 990 ₽</text>
</svg>
