<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store · Админ-панель</title>
    <script>
      // Инициализация темы до первого рендера, чтобы не мигало.
      (function () {
        try {
          var s = localStorage.getItem('admin-color-scheme')
          var d = s === 'dark' || (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', d)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
